name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main, master]

jobs:
  version-bump:
    # Only run if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to ensure version bump detection works
          fetch-depth: 0
          # Use a token that can push to protected branches if needed
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: Run version bump
        run: |
          echo "🔄 Running version bump after PR merge to ${{ github.event.pull_request.base.ref }}"
          
          # Create a custom Node.js script to handle PR version bumping
          cat << 'EOF' > version-bump-pr.js
          import { runVersionBumpForPR } from './packages/version-bump/index.js';
          
          const baseSha = '${{ github.event.pull_request.base.sha }}';
          const headSha = '${{ github.event.pull_request.head.sha }}';
          
          console.log(`Base SHA: ${baseSha}`);
          console.log(`Head SHA: ${headSha}`);
          
          const result = runVersionBumpForPR(baseSha, headSha);
          process.exit(result.success ? 0 : 1);
          EOF
          
          # Run the version bump script
          if node version-bump-pr.js; then
            # Check if version bump created any changes
            if [ -n "$(git status --porcelain)" ]; then
              echo "📦 Version bump created changes, committing..."
              git add .
              git commit -m "chore: version bump after PR #${{ github.event.pull_request.number }} merge [skip ci]"
              git push origin ${{ github.event.pull_request.base.ref }}
              echo "✅ Version bump committed and pushed"
            else
              echo "✅ No version changes needed"
            fi
          else
            echo "⚠️ Version bump failed"
            exit 1
          fi
      
      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            try {
              // Check if any version changes were made
              const status = execSync('git log --oneline -1', { encoding: 'utf8' });
              
              if (status.includes('version bump')) {
                await github.rest.issues.createComment({
                  issue_number: context.payload.pull_request.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '🎉 **Automatic Version Bump Completed**\n\nVersions have been automatically updated for the modified packages/apps in this PR.\n\nCheck the latest commit in the target branch to see the version changes.'
                });
              }
            } catch (error) {
              console.log('No version bump comment needed or error occurred:', error.message);
            }