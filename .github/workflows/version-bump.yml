name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main, master]

jobs:
  version-bump:
    # Only run if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to ensure version bump detection works
          fetch-depth: 0
          # Use a token that can push to protected branches if needed
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: Run version bump
        run: |
          echo "🔄 Running version bump after PR merge to ${{ github.event.pull_request.base.ref }}"
          
          ./scripts/versioning/version-bump.sh ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} --commit
          
          # Push changes if any were made
          if ! git diff --quiet HEAD~1..HEAD; then
            echo "� Pushing version bump changes"
            git push origin ${{ github.event.pull_request.base.ref }}
          fi
      
      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            try {
              // Check if any version changes were made
              const status = execSync('git log --oneline -1', { encoding: 'utf8' });
              
              if (status.includes('version bump')) {
                await github.rest.issues.createComment({
                  issue_number: context.payload.pull_request.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '🎉 **Automatic Version Bump Completed**\n\nVersions have been automatically updated for the modified packages/apps in this PR.\n\nCheck the latest commit in the target branch to see the version changes.'
                });
              }
            } catch (error) {
              console.log('No version bump comment needed or error occurred:', error.message);
            }