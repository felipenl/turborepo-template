services:
  # ====================
  # Reverse Proxy + SSL
  # ====================
  traefik:
    image: docker.io/traefik:v3.0
    container_name: turborepo-traefik
    restart: unless-stopped
    ports:
      - '80:80' # HTTP (redirects to HTTPS)
      - '443:443' # HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.yml:/traefik.yml:ro
      - ./infrastructure/traefik/acme:/acme
    # Uncomment for DNS challenge (Cloudflare):
    # environment:
    #   - CF_API_EMAIL=${CF_API_EMAIL:-}
    #   - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    networks:
      - proxy
    labels:
      - 'traefik.enable=false' # Don't expose Traefik dashboard

  # ====================
  # Database
  # ====================
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: turborepo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No ports exposed - only accessible via internal network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================
  # API Service
  # ====================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: turborepo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${API_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # No ports exposed - accessed via Traefik
    volumes:
      # Mount logs directory
      - ./logs:/app/logs
    networks:
      - internal
      - proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)'
      - 'traefik.http.routers.api.entrypoints=websecure'
      - 'traefik.http.routers.api.tls=true'
      - 'traefik.http.routers.api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.api.loadbalancer.server.port=${API_PORT}'

  # ====================
  # Web Service
  # ====================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: turborepo-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${WEB_PORT}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    # No ports exposed - accessed via Traefik
    networks:
      - proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.web.rule=Host(`${WEB_DOMAIN}`) || Host(`www.${WEB_DOMAIN}`)'
      - 'traefik.http.routers.web.entrypoints=websecure'
      - 'traefik.http.routers.web.tls=true'
      - 'traefik.http.routers.web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.web.loadbalancer.server.port=${WEB_PORT}'

volumes:
  postgres-data:

networks:
  # Internal network for database communication (no internet access)
  internal:
    driver: bridge
    internal: true
  # External network for internet-facing services
  proxy:
    driver: bridge
