# ====================
# Traefik v3 Configuration
# ====================

# ====================
# Entry Points
# ====================
entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ':443'
    http:
      tls:
        certResolver: letsencrypt

# ====================
# Docker Provider
# ====================
providers:
  docker:
    exposedByDefault: false # Only expose services with traefik.enable=true label
    network: proxy

# ====================
# Let's Encrypt SSL
# ====================
certificatesResolvers:
  letsencrypt:
    acme:
      email: your-email@example.com # ⚠️ CHANGE THIS in production
      storage: /acme/acme.json

      # HTTP Challenge (works for most cases)
      # Requires port 80 accessible from internet
      httpChallenge:
        entryPoint: web

      # DNS Challenge (alternative - use for wildcard certs or if behind Cloudflare)
      # Uncomment and configure provider if needed
      # dnsChallenge:
      #   provider: cloudflare
      #   resolvers:
      #     - "1.1.1.1:53"
      #     - "8.8.8.8:53"

# ====================
# Logging
# ====================
log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    headers:
      names:
        Authorization: drop # Don't log sensitive headers
        Cookie: drop
